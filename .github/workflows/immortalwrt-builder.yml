
# ============================================================================

name: ImmortalWrt Builder

on:
  workflow_dispatch:
    inputs:
      # PPPoE 配置
      pppoe_username:
        description: 'PPPoE 账号 (留空不配置)'
        required: false
        default: ''
      pppoe_password:
        description: 'PPPoE 密码 (留空不配置)'
        required: false
        default: ''
      
      # Overlay 大小
      overlay_size:
        description: 'Overlay 分区大小 (MB)'
        required: false
        default: '256'
      
      # 镜像类型
      target_type:
        description: '目标设备类型'
        required: false
        default: 'x86_64'
        type: choice
        options:
          - x86_64
          - x86_generic
          - armsr_armv8
          - ramips_mt7621
          - ramips_mt7620
          - mediatek_filogic
          - qualcommax_ipq60xx
          - qualcommax_ipq807x
      
      # CPU 架构
      cpu_arch:
        description: 'CPU 架构'
        required: false
        default: 'x86_64'
        type: choice
        options:
          - x86_64
          - x86_generic
          - aarch64
          - arm
          - mips
          - mipsel
      
      # CPU 型号
      cpu_model:
        description: 'CPU 型号'
        required: false
        default: 'generic'
        type: choice
        options:
          - generic
          - intel_i3
          - intel_i5
          - intel_i7
          - intel_n100
          - intel_n5105
          - intel_n6005
          - amd_ryzen
          - rockchip_rk3568
          - rockchip_rk3588
          - mediatek_mt7981
          - mediatek_mt7986
          - qualcomm_ipq6018
          - qualcomm_ipq8072
      
      # 网络接口
      wan_interface:
        description: 'WAN 口'
        required: false
        default: 'eth0'
        type: choice
        options:
          - eth0
          - eth1
          - eth2
          - eth3
      
      lan_interface:
        description: 'LAN 口'
        required: false
        default: 'eth1'
        type: choice
        options:
          - eth0
          - eth1
          - eth2
          - eth3
      
      # 编译周期
      auto_compile:
        description: '自动编译周期'
        required: false
        default: 'disabled'
        type: choice
        options:
          - disabled
          - daily
          - weekly
          - monthly
      
      # 源码分支
      source_branch:
        description: 'ImmortalWrt 源码分支'
        required: false
        default: 'openwrt-25.12'
        type: choice
        options:
          - openwrt-25.12
          - openwrt-24.10
          - openwrt-23.05
          - master

  # 定时编译
  schedule:
    - cron: '0 2 * * *'  # 每天 2:00 UTC (北京时间 10:00)

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: ${{ github.event.inputs.source_branch || 'openwrt-25.12' }}
  TARGET_PROFILE: ${{ github.event.inputs.target_type || 'x86_64' }}
  CPU_ARCH: ${{ github.event.inputs.cpu_arch || 'x86_64' }}
  OVERLAY_SIZE: ${{ github.event.inputs.overlay_size || '256' }}
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      # ==========================================================================
      # 1. 准备环境
      # ==========================================================================
      - name: Checkout
        uses: actions/checkout@main
      
      - name: Initialize Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev \
            libssl-dev python3-setuptools rsync swig unzip zlib1g-dev \
            file wget make llvm python3-pip libelf-dev libgmp-dev \
            libmpc-dev libzstd-dev
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          git config --global user.email "qiu1982bot@users.noreply.github.com"
          git config --global user.name "qiu1982bot"
      
      # ==========================================================================
      # 2. 克隆源码
      # ==========================================================================
      - name: Clone Source Code
        run: |
          mkdir -p openwrt
          cd openwrt
          git clone --depth 1 --single-branch -b ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }} .
          cd ..
      
      # ==========================================================================
      # 3. 执行 diy-part1.sh (准备阶段)
      # ==========================================================================
      - name: Run diy-part1.sh
        run: |
          chmod +x diy-part1.sh
          ./diy-part1.sh
      
      # ==========================================================================
      # 4. 更新 feeds
      # ==========================================================================
      - name: Update Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          cd ..
      
      # ==========================================================================
      # 5. 执行 diy-part2.sh (配置阶段)
      # ==========================================================================
      - name: Run diy-part2.sh
        run: |
          chmod +x diy-part2.sh
          ./diy-part2.sh
      
      # ==========================================================================
      # 6. 应用自定义配置
      # ==========================================================================
      - name: Apply Custom Configuration
        run: |
          cd openwrt
          
          # 复制配置文件
          if [ -f "../configs/${{ env.TARGET_PROFILE }}.config" ]; then
            cp "../configs/${{ env.TARGET_PROFILE }}.config" .config
          elif [ -f "../configs/x86_64.config" ]; then
            cp "../configs/x86_64.config" .config
          fi
          
          # 应用配置
          make defconfig
          
          # 自定义 PPPoE 配置
          if [ -n "${{ github.event.inputs.pppoe_username }}" ]; then
            cat >> files/etc/config/network <<EOF
          config interface 'wan'
            option proto 'pppoe'
            option username '${{ github.event.inputs.pppoe_username }}'
            option password '${{ github.event.inputs.pppoe_password }}'
            option ifname '${{ github.event.inputs.wan_interface || 'eth0' }}'
          EOF
          fi
          
          # 自定义网络接口
          cat >> files/etc/config/network <<EOF
          config interface 'lan'
            option type 'bridge'
            option ifname '${{ github.event.inputs.lan_interface || 'eth1' }}'
            option proto 'static'
            option ipaddr '192.168.1.1'
            option netmask '255.255.255.0'
            option ip6assign '60'
          EOF
          
          # 自定义 Overlay 大小
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=${{ env.OVERLAY_SIZE }}" >> .config
          
          cd ..
      
      # ==========================================================================
      # 7. 下载 dl 缓存 (加速)
      # ==========================================================================
      - name: Cache Download Files
        uses: HiGarfield/cachewrtbuild@main
        with:
          ccache: 'false'
          mixkey: ${{ env.TARGET_PROFILE }}-${{ env.REPO_BRANCH }}
          prefix: ${{ github.workspace }}/openwrt
      
      # ==========================================================================
      # 8. 编译固件
      # ==========================================================================
      - name: Compile Firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 || make -j1 V=s
          cd ..
      
      # ==========================================================================
      # 9. 整理输出文件
      # ==========================================================================
      - name: Organize Output Files
        run: |
          mkdir -p upload
          cd openwrt/bin/targets/*/*/
          cp -f *.img.gz ../../../../upload/ 2>/dev/null || true
          cp -f *.ext4.gz ../../../../upload/ 2>/dev/null || true
          cp -f *.squashfs.gz ../../../../upload/ 2>/dev/null || true
          cp -f *.iso.gz ../../../../upload/ 2>/dev/null || true
          cp -f *.vmdk ../../../../upload/ 2>/dev/null || true
          cp -f *.vdi ../../../../upload/ 2>/dev/null || true
          cp -f *.qcow2 ../../../../upload/ 2>/dev/null || true
          cd ../../../../upload
          
          # 生成固件信息
          cat > firmware-info.txt <<EOF
          ================================================================================
          强哥专属 ImmortalWrt 固件
          ================================================================================
          编译时间：$(date +"%Y-%m-%d %H:%M:%S")
          源码分支：${{ env.REPO_BRANCH }}
          目标设备：${{ env.TARGET_PROFILE }}
          CPU 架构：${{ env.CPU_ARCH }}
          Overlay 大小：${{ env.OVERLAY_SIZE }}MB
          WAN 接口：${{ github.event.inputs.wan_interface || 'eth0' }}
          LAN 接口：${{ github.event.inputs.lan_interface || 'eth1' }}
          PPPoE 账号：${{ github.event.inputs.pppoe_username || '未配置' }}
          ================================================================================
          已安装插件:
          - AdGuard Home
          - Cloudflared
          - KSMBD (SMB 服务器)
          - OpenClash
          - qBittorrent
          - Tailscale
          - Docker (Luci)
          - FileBrowser
          - SQM QoS
          - ttyd (Web 终端)
          - VLMCSd (KMS 服务器)
          - DiskMan (磁盘管理)
          - Reboot
          - LXC (容器)
          - FileManager
          - DAED (网络工具)
          ================================================================================
          默认设置:
          - LuCI 界面：中文
          - 时区：Asia/Shanghai
          - 主机名：ImmortalWrt
          - IP 地址：192.168.1.1
          ================================================================================
          EOF
      
      # ==========================================================================
      # 10. 上传固件到 Release
      # ==========================================================================
      - name: Upload Firmware to Release
        uses: softprops/action-gh-release@master
        if: ${{ steps.build.outputs.status }}
        with:
          name: ImmortalWrt ${{ env.TARGET_PROFILE }} ${{ github.run_number }}
          tag_name: ${{ github.run_number }}
          body_path: upload/firmware-info.txt
          files: upload/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # ==========================================================================
      # 11. 清理旧 Release (保留最近 10 个)
      # ==========================================================================
      - name: Delete Old Releases
        uses: dev-drprasad/delete-older-releases@master
        if: ${{ github.event.inputs.auto_compile != 'disabled' }}
        with:
          keep_latest: 10
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # ==========================================================================
      # 12. 编译完成通知
      # ==========================================================================
      - name: Build Complete
        run: |
          echo "=========================================="
          echo "✅ 编译完成！"
          echo "=========================================="
          echo "固件已上传到 GitHub Releases"
          echo "仓库：${{ github.repository }}"
          echo "=========================================="
