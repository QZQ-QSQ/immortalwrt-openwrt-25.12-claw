name: ImmortalWrt Builder

on:
  repository_dispatch:
    types: [build]
  
  workflow_dispatch:
    inputs:
      pppoe_username:
        description: 'PPPoE'
        required: false
        default: ''
      pppoe_password:
        description: 'PPPoE'
        required: false
        default: ''
      overlay_size:
        description: 'Overlay'
        required: false
        default: '256'
      target_type:
        description: '
        required: false
        default: 'x86_64'
        type: choice
        options:
          - x86_64
          - x86_generic
          - armsr_armv8
          - ramips_mt7621
          - ramips_mt7620
          - mediatek_filogic
          - qualcommax_ipq60xx
          - qualcommax_ipq807x
      cpu_arch:
        description: 'CPU'
        required: false
        default: 'x86_64'
        type: choice
        options:
          - x86_64
          - x86_generic
          - aarch64
          - arm
          - mips
          - mipsel
      cpu_model:
        description: 'CPU'
        required: false
        default: 'generic'
        type: choice
        options:
          - generic
          - intel_i3
          - intel_i5
          - intel_i7
          - intel_n100
          - intel_n5105
          - intel_n6005
          - amd_ryzen
          - rockchip_rk3568
          - rockchip_rk3588
          - mediatek_mt7981
          - mediatek_mt7986
          - qualcomm_ipq6018
          - qualcomm_ipq8072
      wan_interface:
        description: 'WAN 口'
        required: false
        default: 'eth0'
        type: choice
        options:
          - eth0
          - eth1
          - eth2
          - eth3
      lan_interface:
        description: 'LAN 口'
        required: false
        default: 'eth1'
        type: choice
        options:
          - eth0
          - eth1
          - eth2
          - eth3
      auto_compile:
        description: '自动编译周期'
        required: false
        default: 'disabled'
        type: choice
        options:
          - disabled
          - daily
          - weekly
          - monthly
      source_branch:
        description: 'ImmortalWrt 源码分支'
        required: false
        default: 'openwrt-25.12'
        type: choice
        options:
          - openwrt-25.12
          - openwrt-24.10
          - openwrt-23.05
          - master

  schedule:
    - cron: '0 2 * * *'

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: ${{ github.event.inputs.source_branch || 'openwrt-25.12' }}
  TARGET_PROFILE: ${{ github.event.inputs.target_type || 'x86_64' }}
  CPU_ARCH: ${{ github.event.inputs.cpu_arch || 'x86_64' }}
  OVERLAY_SIZE: ${{ github.event.inputs.overlay_size || '256' }}
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout
        uses: actions/checkout@main
      
      - name: Initialize Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev \
            libssl-dev python3-setuptools rsync swig unzip zlib1g-dev \
            file wget make llvm python3-pip libelf-dev libgmp-dev \
            libmpc-dev libzstd-dev
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          git config --global user.email "qiu1982bot@users.noreply.github.com"
          git config --global user.name "qiu1982bot"
      
      - name: Clone Source Code
        run: |
          mkdir -p openwrt
          cd openwrt
          git clone --depth 1 --single-branch -b ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }} .
          cd ..
      
      - name: Run diy-part1.sh
        run: |
          chmod +x diy-part1.sh
          ./diy-part1.sh
      
      - name: Update Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          cd ..
      
      - name: Disable USB Storage Packages
        run: |
          cd openwrt
          sed -i 's/^CONFIG_PACKAGE_kmod-usb-storage-uas=y/# CONFIG_PACKAGE_kmod-usb-storage-uas is not set/' .config 2>/dev/null || true
          sed -i 's/^CONFIG_PACKAGE_automount=y/# CONFIG_PACKAGE_automount is not set/' .config 2>/dev/null || true
          cd ..
      
      - name: Configure LuCI Chinese
        run: |
          cd openwrt
          sed -i 's/# CONFIG_LUCI_CSSTIDY is not set/CONFIG_LUCI_CSSTIDY=y/' .config 2>/dev/null || true
          sed -i 's/# CONFIG_PACKAGE_luci is not set/CONFIG_PACKAGE_luci=y/' .config 2>/dev/null || true
          sed -i 's/CONFIG_LUCI_LANG_AUTO=y/CONFIG_LUCI_LANG_zh_Hans=y/' .config 2>/dev/null || true
          cd ..
      
      - name: Install Required Packages
        run: |
          cd openwrt
          ./scripts/feeds install luci-app-adguardhome 2>/dev/null || true
          ./scripts/feeds install luci-app-cloudflared 2>/dev/null || true
          ./scripts/feeds install luci-app-ksmbd 2>/dev/null || true
          ./scripts/feeds install luci-app-tailscale 2>/dev/null || true
          ./scripts/feeds install luci-app-filebrowser 2>/dev/null || true
          ./scripts/feeds install luci-app-sqm 2>/dev/null || true
          ./scripts/feeds install luci-app-ttyd 2>/dev/null || true
          ./scripts/feeds install luci-app-vlmcsd 2>/dev/null || true
          ./scripts/feeds install luci-app-diskman 2>/dev/null || true
          ./scripts/feeds install luci-app-reboot 2>/dev/null || true
          ./scripts/feeds install luci-app-lxc 2>/dev/null || true
          ./scripts/feeds install luci-app-filemanager 2>/dev/null || true
          ./scripts/feeds install luci-app-daed 2>/dev/null || true
          ./scripts/feeds install adguardhome 2>/dev/null || true
          ./scripts/feeds install cloudflared 2>/dev/null || true
          ./scripts/feeds install ksmbd-utils 2>/dev/null || true
          ./scripts/feeds install tailscale 2>/dev/null || true
          ./scripts/feeds install filebrowser 2>/dev/null || true
          ./scripts/feeds install sqm-scripts 2>/dev/null || true
          ./scripts/feeds install ttyd 2>/dev/null || true
          ./scripts/feeds install vlmcsd 2>/dev/null || true
          ./scripts/feeds install block-mount 2>/dev/null || true
          ./scripts/feeds install fdisk 2>/dev/null || true
          ./scripts/feeds install lsblk 2>/dev/null || true
          ./scripts/feeds install lxc 2>/dev/null || true
          ./scripts/feeds install daemontools 2>/dev/null || true
          ./scripts/feeds install kmod-usb2 2>/dev/null || true
          ./scripts/feeds install kmod-usb3 2>/dev/null || true
          ./scripts/feeds install kmod-ata-core 2>/dev/null || true
          ./scripts/feeds install kmod-ata-ahci 2>/dev/null || true
          ./scripts/feeds install kmod-ata-ahci-platform 2>/dev/null || true
          cd ..
      
      - name: Run diy-part2.sh
        run: |
          chmod +x diy-part2.sh
          ./diy-part2.sh
      
      - name: Copy Config File
        run: |
          cd openwrt
          if [ -f "../configs/${{ env.TARGET_PROFILE }}.config" ]; then
            cp "../configs/${{ env.TARGET_PROFILE }}.config" .config
          elif [ -f "../configs/x86_64.config" ]; then
            cp "../configs/x86_64.config" .config
          fi
          cd ..
      
      - name: Copy Files to Firmware
        run: |
          cd openwrt
          if [ -d "../file" ]; then
            cp -r ../file .
          fi
          cd ..
      
      - name: Apply Custom Configuration
        run: |
          cd openwrt
          if [ -n "${{ github.event.inputs.pppoe_username }}" ]; then
            cat >> files/etc/config/network <<EOF

config interface 'wan'
    option proto 'pppoe'
    option username '${{ github.event.inputs.pppoe_username }}'
    option password '${{ github.event.inputs.pppoe_password }}'
    option ifname '${{ github.event.inputs.wan_interface || 'eth0' }}'
EOF
          fi
          cat >> files/etc/config/network <<EOF

config interface 'lan'
    option type 'bridge'
    option ifname '${{ github.event.inputs.lan_interface || 'eth1' }}'
    option proto 'static'
    option ipaddr '192.168.1.1'
    option netmask '255.255.255.0'
    option ip6assign '60'
EOF
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=${{ env.OVERLAY_SIZE }}" >> .config
          cd ..
      
      - name: Cache Download Files
        uses: HiGarfield/cachewrtbuild@main
        with:
          ccache: 'false'
          mixkey: ${{ env.TARGET_PROFILE }}-${{ env.REPO_BRANCH }}
          prefix: ${{ github.workspace }}/openwrt
      
      - name: Compile Firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 || make -j1 V=s
          cd ..
      
      - name: Organize Output Files
        run: |
          mkdir -p upload
          cd openwrt/bin/targets/*/*/
          cp -f *.img.gz ../../../../upload/ 2>/dev/null || true
          cp -f *.ext4.gz ../../../../upload/ 2>/dev/null || true
          cp -f *.squashfs.gz ../../../../upload/ 2>/dev/null || true
          cp -f *.iso.gz ../../../../upload/ 2>/dev/null || true
          cp -f *.vmdk ../../../../upload/ 2>/dev/null || true
          cp -f *.vdi ../../../../upload/ 2>/dev/null || true
          cp -f *.qcow2 ../../../../upload/ 2>/dev/null || true
          cd ../../../../upload
          cat > firmware-info.txt <<EOF
          ================================================================================
          强哥专属 ImmortalWrt 固件
          ================================================================================
          编译时间：$(date +"%Y-%m-%d %H:%M:%S")
          源码分支：${{ env.REPO_BRANCH }}
          目标设备：${{ env.TARGET_PROFILE }}
          CPU 架构：${{ env.CPU_ARCH }}
          Overlay 大小：${{ env.OVERLAY_SIZE }}MB
          WAN 接口：${{ github.event.inputs.wan_interface || 'eth0' }}
          LAN 接口：${{ github.event.inputs.lan_interface || 'eth1' }}
          ================================================================================
          EOF
      
      - name: Upload Firmware to Release
        uses: softprops/action-gh-release@master
        with:
          name: ImmortalWrt ${{ env.TARGET_PROFILE }} ${{ github.run_number }}
          tag_name: ${{ github.run_number }}
          body_path: upload/firmware-info.txt
          files: upload/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Delete Old Releases
        uses: dev-drprasad/delete-older-releases@master
        if: ${{ github.event.inputs.auto_compile != 'disabled' }}
        with:
          keep_latest: 10
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build Complete
        run: |
          echo "=========================================="
          echo "编译完成！"
          echo "=========================================="
