name: ImmortalWrt Builder

on:
  repository_dispatch:
    types: [build]
  
  workflow_dispatch:
    inputs:
      pppoe_username:
        description: 'PPPoE Username (optional)'
        required: false
        default: ''
      pppoe_password:
        description: 'PPPoE Password (optional)'
        required: false
        default: ''
      overlay_size:
        description: '/overlay size (MB)'
        required: true
        default: '512'
      image_type:
        description: 'Image type'
        required: true
        default: 'squashfs'
        type: choice
        options:
          - squashfs
          - ext4
          - initramfs
      cpu_arch:
        description: 'CPU architecture'
        required: true
        default: 'aarch64_cortex-a53'
        type: choice
        options:
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - arm_cortex-a7
          - arm_cortex-a9
          - x86_64
          - mipsel_24kc
          - mips_24kc
      target:
        description: 'Target device'
        required: true
        default: 'mediatek/filogic'
        type: choice
        options:
          - mediatek/filogic
          - mediatek/mt7622
          - qualcommax/ipq60xx
          - qualcommax/ipq807x
          - ramips/mt7621
          - rockchip/armv8
          - x86/64
          - x86/generic
      cpu_model:
        description: 'CPU model'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - mt7622
          - mt7981
          - mt7986
          - ipq6000
          - ipq807x
          - rk3568
          - rk3588
      wan_port:
        description: 'WAN port'
        required: true
        default: 'eth0'
        type: choice
        options:
          - eth0
          - eth1
          - eth2
          - eth3
      lan_port:
        description: 'LAN ports (comma separated, e.g. eth1,eth2,eth3)'
        required: true
        default: 'eth1,eth2,eth3'
      release_name:
        description: 'Release name (optional)'
        required: false
        default: 'immortalwrt-custom'

  schedule:
    - cron: '0 0 * * 0'

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/pipx
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget qemu-utils ccache
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: Clone ImmortalWrt source
        working-directory: /workdir
        run: |
          df -hT $PWD
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Load custom feeds
        run: |
          cd openwrt
          echo "src-git small https://github.com/kenzok8/small.git" >> feeds.conf.default
          echo "src-git kenzok8 https://github.com/kenzok8/openwrt-packages.git" >> feeds.conf.default
          echo "src-git luci_cn https://github.com/coolsnowwolf/luci.git" >> feeds.conf.default

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate config file
        run: |
          cd openwrt
          
          TARGET_INPUT="${{ github.event.inputs.target }}"
          [ -z "$TARGET_INPUT" ] && TARGET_INPUT="mediatek/filogic"
          
          case "$TARGET_INPUT" in
            "mediatek/filogic")
              echo "CONFIG_TARGET_mediatek=y" >> .config
              echo "CONFIG_TARGET_mediatek_filogic=y" >> .config
              echo "CONFIG_TARGET_mediatek_filogic_DEVICE_mt7981=y" >> .config
              ;;
            "mediatek/mt7622")
              echo "CONFIG_TARGET_mediatek=y" >> .config
              echo "CONFIG_TARGET_mediatek_mt7622=y" >> .config
              echo "CONFIG_TARGET_mediatek_mt7622_DEVICE_redmi-router-ax6s=y" >> .config
              ;;
            "qualcommax/ipq60xx")
              echo "CONFIG_TARGET_qualcommax=y" >> .config
              echo "CONFIG_TARGET_qualcommax_ipq60xx=y" >> .config
              echo "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y" >> .config
              ;;
            "qualcommax/ipq807x")
              echo "CONFIG_TARGET_qualcommax=y" >> .config
              echo "CONFIG_TARGET_qualcommax_ipq807x=y" >> .config
              echo "CONFIG_TARGET_qualcommax_ipq807x_DEVICE_redmi_ax6=y" >> .config
              ;;
            "ramips/mt7621")
              echo "CONFIG_TARGET_ramips=y" >> .config
              echo "CONFIG_TARGET_ramips_mt7621=y" >> .config
              echo "CONFIG_TARGET_ramips_mt7621_DEVICE_xiaomi_mi-router-4a-gigabit=y" >> .config
              ;;
            "rockchip/armv8")
              echo "CONFIG_TARGET_rockchip=y" >> .config
              echo "CONFIG_TARGET_rockchip_armv8=y" >> .config
              echo "CONFIG_TARGET_rockchip_armv8_DEVICE_friendlyarm_nanopi-r2s=y" >> .config
              ;;
            "x86/64")
              echo "CONFIG_TARGET_x86=y" >> .config
              echo "CONFIG_TARGET_x86_64=y" >> .config
              ;;
            "x86/generic")
              echo "CONFIG_TARGET_x86=y" >> .config
              echo "CONFIG_TARGET_x86_generic=y" >> .config
              ;;
          esac
          
          IMAGE_TYPE="${{ github.event.inputs.image_type }}"
          [ -z "$IMAGE_TYPE" ] && IMAGE_TYPE="squashfs"
          echo "CONFIG_TARGET_ROOTFS_${IMAGE_TYPE}=y" >> .config
          
          # Chinese language
          echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-opkg-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-upnp-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-wol-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-commands-zh-cn=y" >> .config
          echo "CONFIG_LUCI_LANG_zh_Hans=y" >> .config
          
          # USB support
          echo "CONFIG_PACKAGE_kmod-usb2=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb2-pci=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb3=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-core=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-ehci=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-ohci=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-ohci-pci=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-uhci=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-xhci-hcd=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-xhci-mtk=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-dwc3=y" >> .config
          
          # USB storage (exclude problematic)
          echo "CONFIG_PACKAGE_kmod-usb-storage=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-storage-extras=y" >> .config
          echo "# CONFIG_PACKAGE_kmod-usb-storage-uas is not set" >> .config
          
          # SATA support
          echo "CONFIG_PACKAGE_kmod-ata-core=y" >> .config
          echo "CONFIG_PACKAGE_kmod-ata-ahci=y" >> .config
          echo "CONFIG_PACKAGE_kmod-ata-ahci-platform=y" >> .config
          echo "CONFIG_PACKAGE_kmod-ata-nvidia-sata=y" >> .config
          echo "CONFIG_PACKAGE_kmod-ata-piix=y" >> .config
          echo "CONFIG_PACKAGE_kmod-ata-sil=y" >> .config
          echo "CONFIG_PACKAGE_kmod-ata-via-sata=y" >> .config
          
          # SCSI
          echo "CONFIG_PACKAGE_kmod-scsi-core=y" >> .config
          echo "CONFIG_PACKAGE_kmod-scsi-generic=y" >> .config
          
          # Filesystems
          echo "CONFIG_PACKAGE_kmod-fs-ext4=y" >> .config
          echo "CONFIG_PACKAGE_kmod-fs-ntfs=y" >> .config
          echo "CONFIG_PACKAGE_kmod-fs-ntfs3=y" >> .config
          echo "CONFIG_PACKAGE_kmod-fs-vfat=y" >> .config
          echo "CONFIG_PACKAGE_kmod-fs-exfat=y" >> .config
          echo "CONFIG_PACKAGE_kmod-fs-hfs=y" >> .config
          echo "CONFIG_PACKAGE_kmod-fs-hfsplus=y" >> .config
          
          # NTFS tools
          echo "CONFIG_PACKAGE_ntfs-3g=y" >> .config
          echo "CONFIG_PACKAGE_ntfs-3g-utils=y" >> .config
          echo "CONFIG_PACKAGE_ntfsprogs=y" >> .config
          
          # Partition tools
          echo "CONFIG_PACKAGE_fdisk=y" >> .config
          echo "CONFIG_PACKAGE_gdisk=y" >> .config
          echo "CONFIG_PACKAGE_parted=y" >> .config
          echo "CONFIG_PACKAGE_e2fsprogs=y" >> .config
          echo "CONFIG_PACKAGE_resize2fs=y" >> .config
          echo "CONFIG_PACKAGE_tune2fs=y" >> .config
          echo "CONFIG_PACKAGE_blkid=y" >> .config
          echo "CONFIG_PACKAGE_lsblk=y" >> .config
          
          # Disable automount
          echo "# CONFIG_PACKAGE_automount is not set" >> .config
          
          # Luci apps
          echo "CONFIG_PACKAGE_luci-app-upnp=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-wol=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-commands=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-diskman=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-diskman_INCLUDE_btrfs_progs=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-diskman_INCLUDE_lsblk=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-samba4=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ttyd=y" >> .config
          
          # kenzok8 packages
          echo "CONFIG_PACKAGE_luci-app-argon-config=y" >> .config
          echo "CONFIG_PACKAGE_luci-theme-argon=y" >> .config
          
          # Tools
          echo "CONFIG_PACKAGE_htop=y" >> .config
          echo "CONFIG_PACKAGE_bash=y" >> .config
          echo "CONFIG_PACKAGE_curl=y" >> .config
          echo "CONFIG_PACKAGE_wget-ssl=y" >> .config
          echo "CONFIG_PACKAGE_coreutils=y" >> .config
          echo "CONFIG_PACKAGE_coreutils-base64=y" >> .config
          echo "CONFIG_PACKAGE_coreutils-nohup=y" >> .config
          echo "CONFIG_PACKAGE_coreutils-timeout=y" >> .config
          echo "CONFIG_PACKAGE_usbutils=y" >> .config
          echo "CONFIG_PACKAGE_pciutils=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-vlmcsd=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-wrtbwmon=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ddns=y" >> .config
          echo "CONFIG_PACKAGE_ddns-scripts=y" >> .config
          echo "CONFIG_PACKAGE_ddns-scripts-services=y" >> .config
          
          # Build options
          echo "CONFIG_DEVEL=y" >> .config
          echo "CONFIG_CCACHE=y" >> .config
          echo "CONFIG_TOOLCHAINOPTS=y" >> .config
          
          make defconfig

      - name: Download package sources
        run: |
          cd openwrt
          make download -j$(nproc)
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Build firmware
        id: compile
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT
          echo "FILE_DATE=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV

      - name: Check disk space
        if: (!cancelled())
        run: df -hT

      - name: Upload bin directory
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
        with:
          name: OpenWrt_bin${{ env.FILE_DATE }}
          path: openwrt/bin

      - name: Organize files
        id: organize
        if: steps.compile.outputs.status == 'success' && !cancelled()
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware to artifact
        uses: actions/upload-artifact@v4
        if: steps.organize.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        with:
          name: OpenWrt_firmware${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}

      - name: Generate release tag
        id: tag
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
        run: |
          echo "release_tag=$(date +%Y.%m.%d-%H%M)" >> $GITHUB_OUTPUT
          touch release.txt
          echo "ImmortalWrt Auto Build" >> release.txt
          echo "Branch: ${{ env.REPO_BRANCH }}" >> release.txt
          echo "Target: ${{ github.event.inputs.target || 'mediatek/filogic' }}" >> release.txt
          echo "Arch: ${{ github.event.inputs.cpu_arch || 'aarch64_cortex-a53' }}" >> release.txt
          echo "Image type: ${{ github.event.inputs.image_type || 'squashfs' }}" >> release.txt
          echo "WAN: ${{ github.event.inputs.wan_port || 'eth0' }}" >> release.txt
          echo "LAN: ${{ github.event.inputs.lan_port || 'eth1,eth2,eth3' }}" >> release.txt
          if [ -n "${{ github.event.inputs.pppoe_username }}" ]; then
            echo "PPPoE: Configured" >> release.txt
          else
            echo "PPPoE: Not configured" >> release.txt
          fi
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        if: steps.tag.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*

      - name: Delete old releases
        uses: dev-drprasad/delete-older-releases@v0.3.2
        if: steps.tag.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
        with:
          keep_latest: 5
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
